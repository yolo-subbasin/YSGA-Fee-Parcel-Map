<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YSGA Fee Parcel Viewer</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
<style>
  :root {
    --ink: #24302a;
    --paper: #f6f4ee;
    --line: #cfc9ba;
    --district-y: #3f6fb0;
    --district-n: #b5453c;
    --district-f: #4f8f5b;
    --hatch-line: #1a1a1a;
    --accent: #b5502c;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    height: 100%;
    font-family: "Iowan Old Style", "Palatino Linotype", Georgia, serif;
    background: var(--paper);
    color: var(--ink);
  }

  #app {
    display: grid;
    grid-template-columns: 1fr 360px;
    height: 100vh;
  }

  #map {
    height: 100%;
    background: var(--paper);
  }

  #panel {
    border-left: 1px solid var(--line);
    background: var(--paper);
    padding: 24px 22px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
  }

  .brand {
    font-size: 12px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 4px;
  }

  h1 {
    font-size: 22px;
    margin: 0 0 18px 0;
    font-weight: 600;
    line-height: 1.25;
  }

  .search-wrap {
    position: relative;
    margin-bottom: 16px;
  }

  #apn-search {
    width: 100%;
    padding: 9px 10px;
    border: 1px solid var(--line);
    border-radius: 2px;
    font-family: inherit;
    font-size: 14px;
    background: #ffffff;
    color: var(--ink);
  }
  #apn-search:focus {
    outline: none;
    border-color: var(--accent);
  }

  .search-results {
    position: absolute;
    top: 100%;
    left: 0;
    right: 0;
    background: #ffffff;
    border: 1px solid var(--line);
    border-top: none;
    max-height: 200px;
    overflow-y: auto;
    z-index: 1000;
    display: none;
    box-shadow: 0 4px 8px rgba(0,0,0,0.08);
  }
  .search-results.active {
    display: block;
  }

  .search-result-item {
    padding: 7px 10px;
    font-size: 13.5px;
    cursor: pointer;
  }
  .search-result-item:hover,
  .search-result-item.highlighted {
    background: var(--paper);
  }

  .search-no-results {
    padding: 7px 10px;
    font-size: 13px;
    color: #5c6a5f;
  }

  .hint {
    font-size: 13.5px;
    line-height: 1.5;
    color: #5c6a5f;
    border: 1px dashed var(--line);
    padding: 12px 14px;
    border-radius: 2px;
  }

  .parcel-card {
    display: none;
  }
  .parcel-card.active {
    display: block;
  }

  .parcel-id {
    font-size: 12px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #5c6a5f;
    margin-bottom: 2px;
  }

  .parcel-name {
    font-size: 20px;
    font-weight: 600;
    margin-bottom: 14px;
    border-bottom: 1px solid var(--line);
    padding-bottom: 12px;
  }

  dl {
    margin: 0;
    display: grid;
    grid-template-columns: auto 1fr;
    row-gap: 10px;
    column-gap: 14px;
    font-size: 14px;
  }

  dt {
    color: #5c6a5f;
    font-size: 11px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding-top: 2px;
  }

  dd {
    margin: 0;
    font-weight: 500;
  }

  .swatch {
    display: inline-block;
    width: 10px;
    height: 10px;
    margin-right: 6px;
    vertical-align: middle;
    border: 1px solid rgba(0,0,0,0.25);
    flex-shrink: 0;
  }

  .section-title {
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #5c6a5f;
    margin: 20px 0 8px 0;
  }

  table.landcover-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }

  table.landcover-table th {
    text-align: left;
    font-size: 10.5px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: #5c6a5f;
    font-weight: 600;
    padding: 0 0 6px 0;
    border-bottom: 1px solid var(--line);
  }

  table.landcover-table td {
    padding: 7px 0;
    border-bottom: 1px solid #e5e1d4;
  }

  table.landcover-table td.num {
    text-align: right;
    font-variant-numeric: tabular-nums;
  }

  table.landcover-table tfoot td {
    border-bottom: none;
    border-top: 1px solid var(--line);
    font-weight: 600;
    padding-top: 8px;
  }

  .lc-label {
    display: flex;
    align-items: center;
  }

  .legend {
    margin-top: auto;
    padding-top: 18px;
    border-top: 1px solid var(--line);
    font-size: 12.5px;
  }

  .legend-title {
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #5c6a5f;
    margin-bottom: 8px;
  }

  .legend-row {
    display: flex;
    align-items: center;
    margin-bottom: 6px;
  }

  .leaflet-popup-content-wrapper {
    border-radius: 2px;
    font-family: inherit;
  }

  .apn-label {
    background: transparent;
    border: none;
    box-shadow: none;
    padding: 0;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.02em;
    color: #1a1a1a;
    text-shadow: 0 0 3px #ffffff, 0 0 3px #ffffff, 0 0 3px #ffffff;
    display: none;
    pointer-events: none;
  }
  .apn-label::before { display: none; }
  #map.labels-visible .apn-label { display: block; }

  @media (max-width: 720px) {
    #app { grid-template-columns: 1fr; grid-template-rows: 55vh 1fr; }
    #panel { border-left: none; border-top: 1px solid var(--line); }
  }
</style>
</head>
<body>

<div id="app">
  <div id="map"></div>
  <div id="panel">
    <div class="brand">YSGA Fee Parcel Viewer</div>
    <h1>Click a parcel to see its data</h1>

    <div class="search-wrap">
      <input type="text" id="apn-search" placeholder="Search parcel APN…" autocomplete="off" />
      <div class="search-results" id="apn-search-results"></div>
    </div>

    <div class="hint" id="hint">
      Loading parcel and land cover data…
    </div>

    <div class="parcel-card" id="card">
      <div class="parcel-name" id="card-name"></div>
      <dl id="card-fields"></dl>

      <div class="section-title">Crop mix within parcel</div>
      <table class="landcover-table" id="lc-table">
        <thead>
          <tr><th>Crop Type</th><th class="num">Acres</th></tr>
        </thead>
        <tbody id="lc-table-body"></tbody>
        <tfoot>
          <tr><td>Total cropped acreage (Tier 2)</td><td class="num" id="lc-total-acres"></td></tr>
        </tfoot>
      </table>
    </div>

    <div class="legend">
      <div class="legend-title">Parcels</div>
      <div class="legend-row"><span class="swatch" style="background: var(--district-y)"></span>Districted</div>
      <div class="legend-row"><span class="swatch" style="background: var(--district-n)"></span>Undistricted</div>
      <div class="legend-row"><span class="swatch" style="background: var(--district-f)"></span>Federal</div>
      <div class="legend-row"><span class="swatch" style="background: repeating-linear-gradient(45deg, #1a1a1a, #1a1a1a 2px, transparent 2px, transparent 5px)"></span>Tier 1 and Domestic Tier 2 fees paid by a Community Water System (not billed via tax roll)</div>
    </div>

  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>

  // ---------------------------------------------------------------
  // DATA SOURCES
  // Parcels and land cover are loaded as external GeoJSON files
  // sitting next to this HTML file. This keeps the page fast even
  // with large datasets, and means you swap in real data just by
  // replacing parcels.geojson / landcover.geojson with your own.
  //
  // NOTE: fetch() requires the page to be served over http/https —
  // it will fail if you just double-click the HTML file and open it
  // as a file:// URL. Test with a local server (e.g. `python3 -m
  // http.server`) or upload to your actual site.
  //
  // LAND COVER SCHEMA: the land cover layer is expected to already
  // be intersected with parcel boundaries upstream (e.g. in your
  // GIS pipeline) with acreage recalculated per fragment. Each
  // feature carries an APN linking it back to its parent parcel, so
  // matching a parcel's crop mix is a simple attribute join — no
  // geometric clipping needed here.
  // ---------------------------------------------------------------

  const PARCELS_URL = 'parcels.geojson';
  const LANDCOVER_URL = 'landcover.geojson';

  // IMPORTANT: the land cover file's APN values (e.g. "036-170-022-000")
  // match the parcels file's "Formatted_" field, NOT its raw "APN" field
  // (which is unformatted, e.g. "003011040000"). Formatted_ is used as
  // the join key and as the user-facing parcel identifier everywhere.
  const PARCEL_APN_FIELD = 'Formatted_';
  const LC_APN_FIELD = 'APN';
  const LC_ACRES_FIELD = 'Crop Acres';
  const LC_CODE_FIELD = 'Recent_Cro';

  const districtColors = {
    Y: getComputedStyle(document.documentElement).getPropertyValue('--district-y').trim(),
    N: getComputedStyle(document.documentElement).getPropertyValue('--district-n').trim(),
    F: getComputedStyle(document.documentElement).getPropertyValue('--district-f').trim()
  };

  // Recent_Cro codes are a leading category letter followed by a
  // number for the specific type (e.g. "D12" = Almonds, under the
  // Deciduous category). We symbolize by the letter only.
  function cropLetter(code) {
    return String(code || '').trim().charAt(0).toUpperCase() || '?';
  }

  // Full code -> crop type name lookup (from the crop code key).
  // Used to populate the summary table regardless of whether the
  // land cover data's own "Crop Type" field is present/accurate.
  const CODE_TO_CROPTYPE = {
    "C": "Citrus and Subtropical - No Subclass", "C10": "Eucalyptus", "C4": "Dates", "C6": "Olives",
    "C7": "Subtropical Fruits Misc.", "C8": "Kiwis", "D1": "Apples", "D10": "Deciduous - Misc.",
    "D12": "Almonds", "D13": "Walnuts", "D14": "Pistachios", "D15": "Pomegranates", "D17": "Pecans",
    "D2": "Apricots", "D3": "Cherries", "D5": "Peaches and Nectarines", "D6": "Pears", "D7": "Plums",
    "D8": "Prunes", "F10": "Beans (dry)", "F11": "Field Misc.", "F12": "Sunflowers",
    "F16": "Corn, Sorghum or Sudan", "F2": "Safflower", "G2": "Wheat", "G6": "Grain and Hay - Misc.",
    "P1": "Alfalfa and alfalfa mixtures", "P3": "Pasture - Mixed", "P6": "Pasture - Miscellaneous Grasses",
    "P7": "Pasture - Turf Farms", "R1": "Rice", "R2": "Rice - Wild", "T10": "Onions and Garlic",
    "T16": "Flowers, nursery and Christmas Tree Farms", "T18": "Truck Crops - Misc.", "T19": "Bushberries",
    "T20": "Strawberries", "T21": "Peppers (Chili, Bell, etc.)", "T27": "Greenhouse", "T32": "Tomatoes (all)",
    "T4": "Cole crops (mixture of T22-T25)", "T9": "Melons, Squash, and Cucumbers",
    "U": "Urban - Unspecified Residential, Commercial, Industrial", "UL2": "Urban Landscape - Golf Course Irrigated",
    "V": "Vineyards", "X": "Unclassified", "YP": "Young Perennial"
  };
  function cropTypeName(code) {
    return CODE_TO_CROPTYPE[code] || String(code || 'Unknown');
  }

  // Letter category -> legend label + color, per the crop code key.
  // X and Y are rendered as hatch patterns instead of solid colors
  // (see injectHatchPattern below), so they're excluded from
  // LETTER_COLORS and handled separately in landCoverFill().
  const LETTER_LABELS = {
    C: 'Citrus and Subtropical', D: 'Deciduous', F: 'Field Crops', G: 'Grain and Hay',
    P: 'Pasture', R: 'Rice', T: 'Truck Crops', U: 'Urban Landscape', V: 'Vineyards',
    X: 'Unclassified', Y: 'Young Perennial'
  };
  const LETTER_ORDER = ['C', 'D', 'F', 'G', 'P', 'R', 'T', 'U', 'V', 'X', 'Y'];
  const LETTER_COLORS = {
    C: '#f7e9a0', // light yellow
    D: '#f5c896', // light orange
    F: '#c9a878', // light brown
    G: '#f0b8c8', // light pink
    P: '#c1585a', // darker red (differentiated from Grain and Hay)
    R: '#a8d8a8', // light green
    T: '#a8c8e0', // light blue
    U: '#3a6b45', // dark green (Urban Landscape)
    V: '#c8a8d8', // light purple
    X: '#c9c9c9', // grey (Unclassified)
    Y: '#b8c9a0'  // light sage (Young Perennial — distinct from the rest)
  };
  function landCoverFill(letter) {
    return LETTER_COLORS[letter] || '#ccc';
  }

  // Parcel attribute schema: County, APN, Formatted_, District_P,
  // "GSA Acres", "Water System Type". Field names with spaces are
  // accessed via bracket notation below.
  const fieldLabels = {
    County: "County",
    District_P: "District_P",
    "GSA Acres": "GSA Acres"
  };

  function formatValue(key, value) {
    if (key === "GSA Acres") return Number(value).toLocaleString() + " ac (Tier 1)";
    return value;
  }

  // ---------------------------------------------------------------
  // MAP SETUP
  // ---------------------------------------------------------------

  const map = L.map('map', { zoomControl: true }).setView([38.5449, -121.7405], 15);

  const lightBasemap = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; OpenStreetMap contributors &copy; CARTO',
    maxZoom: 19
  });

  const satelliteBasemap = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
    attribution: 'Tiles &copy; Esri &mdash; Source: Esri, Maxar, Earthstar Geographics',
    maxZoom: 19
  });

  lightBasemap.addTo(map);

  // Canvas renderer: at real-world scale (tens of thousands of
  // parcels), Canvas is dramatically faster than SVG since it
  // doesn't create a DOM element per shape. We build the "Water
  // System Type = C" hatch as an actual CanvasPattern (a small
  // offscreen tile with diagonal lines and a transparent
  // background) and use that as fillColor — Canvas's fillStyle
  // accepts CanvasPattern objects directly, same as it accepts a
  // color string.
  const canvasRenderer = L.canvas({ padding: 0.5 }).addTo(map);

  function makeDiagonalCanvasPattern(lineColor, bgColor, size, lineWidth) {
    size = size || 8;
    lineWidth = lineWidth || 2;
    const tile = document.createElement('canvas');
    tile.width = size;
    tile.height = size;
    const tctx = tile.getContext('2d');
    if (bgColor) {
      tctx.fillStyle = bgColor;
      tctx.fillRect(0, 0, size, size);
    }
    tctx.strokeStyle = lineColor;
    tctx.lineWidth = lineWidth;
    // Three parallel diagonal strokes (main + two wrapped copies) so
    // the tile lines up seamlessly when repeated.
    tctx.beginPath();
    tctx.moveTo(0, size); tctx.lineTo(size, 0);
    tctx.moveTo(-size / 2, size / 2); tctx.lineTo(size / 2, -size / 2);
    tctx.moveTo(size / 2, size * 1.5); tctx.lineTo(size * 1.5, size / 2);
    tctx.stroke();
    // createPattern can be called against any 2D context; the
    // resulting CanvasPattern is reusable as fillStyle anywhere.
    return tile.getContext('2d').createPattern(tile, 'repeat');
  }

  const hatchPattern = makeDiagonalCanvasPattern(
    getComputedStyle(document.documentElement).getPropertyValue('--hatch-line').trim(),
    null // transparent background — lets the parcel color underneath show through the gaps
  );

  let selectedLayer = null;
  let geoLayer = null;
  let hatchLayer = null;
  let landCoverByAPN = {};
  let focusApn = null; // set when a parcel is selected, to dim everything else
  const highlightGroup = L.featureGroup().addTo(map);

  function parcelStyle(feature, isSelected) {
    const apn = String(feature.properties[PARCEL_APN_FIELD]);
    const dimmed = focusApn && apn !== focusApn;
    return {
      color: isSelected ? '#b5502c' : (dimmed ? 'rgba(42,42,42,0.15)' : '#2a2a2a'),
      weight: isSelected ? 3 : 1,
      fillOpacity: dimmed ? 0.05 : 0.35,
      fillColor: districtColors[feature.properties.District_P] || '#999'
    };
  }

  function hatchStyleFor(feature) {
    const apn = String(feature.properties[PARCEL_APN_FIELD]);
    const dimmed = focusApn && apn !== focusApn;
    return { stroke: false, fillColor: hatchPattern, fillOpacity: dimmed ? 0.05 : 1, interactive: false };
  }

  // ---------------------------------------------------------------
  // PARCEL SELECTION + CROP MIX SUMMARY
  // Land cover is pre-intersected with parcels upstream, so this is
  // just an attribute join on APN — group the matching fragments by
  // Crop Type and sum their (already-recalculated) acreage.
  // ---------------------------------------------------------------

  function showParcel(feature) {
    document.getElementById('hint').style.display = 'none';
    const card = document.getElementById('card');
    card.classList.add('active');
    document.getElementById('card-name').textContent = "APN " + feature.properties[PARCEL_APN_FIELD];

    const dl = document.getElementById('card-fields');
    dl.innerHTML = '';
    Object.keys(fieldLabels).forEach(key => {
      if (feature.properties[key] === undefined) return;
      const dt = document.createElement('dt');
      dt.textContent = fieldLabels[key];
      const dd = document.createElement('dd');
      dd.textContent = formatValue(key, feature.properties[key]);
      dl.appendChild(dt);
      dl.appendChild(dd);
    });

    updateCropSummary(feature);
  }

  function updateCropSummary(parcelFeature) {
    highlightGroup.clearLayers();
    const tbody = document.getElementById('lc-table-body');
    tbody.innerHTML = '';

    const apn = String(parcelFeature.properties[PARCEL_APN_FIELD]);
    const matches = landCoverByAPN[apn] || [];

    const totalsByClass = {};
    const swatchByClass = {};
    let grandTotalAcres = 0;

    matches.forEach(lcFeature => {
      const code = lcFeature.properties[LC_CODE_FIELD];
      const letter = cropLetter(code);
      const cls = cropTypeName(code);
      const acres = Number(lcFeature.properties[LC_ACRES_FIELD]) || 0;
      const fill = landCoverFill(letter);
      totalsByClass[cls] = (totalsByClass[cls] || 0) + acres;
      swatchByClass[cls] = fill;
      grandTotalAcres += acres;

      // Draw the actual matching land cover polygon so it's visible
      // which fragments are being counted in the summary, and make
      // it clickable to show which crop that specific polygon is.
      L.geoJSON(lcFeature.geometry, {
        style: {
          color: '#ffffff',
          weight: 1.5,
          dashArray: '3,3',
          fillColor: fill,
          fillOpacity: 0.9,
          interactive: true
        }
      }).bindPopup(`<strong>APN ${apn}</strong><br>${acres.toFixed(2)} ac — ${cls}`)
        .on('click', e => L.DomEvent.stopPropagation(e))
        .addTo(highlightGroup);
    });

    const rows = Object.keys(totalsByClass).sort((a, b) => totalsByClass[b] - totalsByClass[a]);

    if (rows.length === 0) {
      tbody.innerHTML = '<tr><td colspan="2" style="color:#5c6a5f; padding-top:8px;">There are no cropped acres on this parcel.</td></tr>';
    } else {
      rows.forEach(cls => {
        const acres = totalsByClass[cls];
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td><span class="lc-label"><span class="swatch" style="background:${swatchByClass[cls] || '#ccc'}"></span>${cls}</span></td>
          <td class="num">${acres.toFixed(2)}</td>
        `;
        tbody.appendChild(tr);
      });
    }

    document.getElementById('lc-total-acres').textContent = grandTotalAcres.toFixed(2) + ' ac';
  }

  // ---------------------------------------------------------------
  // LOAD DATA
  // ---------------------------------------------------------------

  Promise.all([
    fetch(PARCELS_URL).then(r => { if (!r.ok) throw new Error('parcels.geojson: ' + r.status); return r.json(); }),
    fetch(LANDCOVER_URL).then(r => { if (!r.ok) throw new Error('landcover.geojson: ' + r.status); return r.json(); })
  ]).then(([parcelData, landCoverData]) => {

    // Index land cover fragments by APN for fast parcel lookup.
    landCoverByAPN = {};
    landCoverData.features.forEach(f => {
      const apn = String(f.properties[LC_APN_FIELD]);
      (landCoverByAPN[apn] = landCoverByAPN[apn] || []).push(f);
    });

    L.control.layers(
      { "Map": lightBasemap, "Satellite": satelliteBasemap },
      null,
      { position: 'topright', collapsed: false }
    ).addTo(map);

    geoLayer = L.geoJSON(parcelData, {
      renderer: canvasRenderer,
      style: feature => parcelStyle(feature, false),
      onEachFeature: (feature, layer) => {
        layer.bindPopup(`<strong>APN ${feature.properties[PARCEL_APN_FIELD]}</strong>`);
        layer.on('click', e => {
          L.DomEvent.stopPropagation(e); // don't let this bubble to the map's click-away handler
          activateParcel(layer);
        });
      }
    }).addTo(map);

    hatchLayer = L.geoJSON(parcelData, {
      renderer: canvasRenderer,
      filter: f => f.properties['Water System Type'] === 'C',
      style: hatchStyleFor
    }).addTo(map);

    // ---------------------------------------------------------------
    // FOCUS MODE
    // Selecting a parcel dims everything else (other parcels' colors,
    // the hatch layer, and the full land cover overlay if it's on) so
    // attention stays on that parcel's crop mix. Clicking empty map
    // space clears the focus and restores full symbology.
    // ---------------------------------------------------------------

    function refreshAllStyles() {
      geoLayer.eachLayer(layer => layer.setStyle(parcelStyle(layer.feature, layer === selectedLayer)));
      hatchLayer.eachLayer(layer => layer.setStyle(hatchStyleFor(layer.feature)));
    }

    function activateParcel(layer) {
      selectedLayer = layer;
      focusApn = String(layer.feature.properties[PARCEL_APN_FIELD]);
      refreshAllStyles();
      showParcel(layer.feature);
    }

    function clearFocus() {
      focusApn = null;
      selectedLayer = null;
      highlightGroup.clearLayers();
      refreshAllStyles();
      document.getElementById('card').classList.remove('active');
      const hint = document.getElementById('hint');
      hint.style.display = 'block';
      hint.textContent = 'Click a parcel to see its details and crop mix.';
    }

    map.on('click', clearFocus);

    // ---------------------------------------------------------------
    // APN SEARCH
    // ---------------------------------------------------------------

    const apnIndex = [];
    geoLayer.eachLayer(layer => {
      apnIndex.push({ apn: String(layer.feature.properties[PARCEL_APN_FIELD]), layer });
    });

    function selectParcel(layer) {
      activateParcel(layer);
      map.fitBounds(layer.getBounds(), { maxZoom: 18, padding: [40, 40] });
      layer.openPopup();
    }

    const searchInput = document.getElementById('apn-search');
    const searchResults = document.getElementById('apn-search-results');

    searchInput.addEventListener('input', () => {
      const q = searchInput.value.trim().toLowerCase();
      searchResults.innerHTML = '';
      if (q.length < 2) { searchResults.classList.remove('active'); return; }

      const matches = [];
      for (let i = 0; i < apnIndex.length && matches.length < 8; i++) {
        if (apnIndex[i].apn.toLowerCase().includes(q)) matches.push(apnIndex[i]);
      }
      if (matches.length === 0) {
        searchResults.innerHTML = '<div class="search-no-results">No matching parcels</div>';
        searchResults.classList.add('active');
        return;
      }

      matches.forEach(entry => {
        const item = document.createElement('div');
        item.className = 'search-result-item';
        item.textContent = entry.apn;
        item.addEventListener('click', () => {
          searchInput.value = entry.apn;
          searchResults.classList.remove('active');
          selectParcel(entry.layer);
        });
        searchResults.appendChild(item);
      });
      searchResults.classList.add('active');
    });

    searchInput.addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        const first = searchResults.querySelector('.search-result-item');
        if (first) first.click();
      } else if (e.key === 'Escape') {
        searchResults.classList.remove('active');
      }
    });

    document.addEventListener('click', e => {
      if (!e.target.closest('.search-wrap')) searchResults.classList.remove('active');
    });

    // ---------------------------------------------------------------
    // APN LABELS (viewport-lazy)
    // At real scale, binding a permanent tooltip to every parcel up
    // front would create tens of thousands of DOM nodes that just
    // sit there hidden. Instead, only parcels currently within the
    // visible map bounds get a tooltip, rebuilt on every pan/zoom.
    // Each layer's bounds are cached once at load so this stays a
    // cheap numeric check rather than recomputing geometry bounds
    // on every move. Small parcels (< MIN_LABEL_ACRES) are excluded
    // from the cache entirely up front, since they'd rarely have
    // room to show a readable label anyway.
    // ---------------------------------------------------------------

    const LABEL_MIN_ZOOM = 15;
    const MIN_LABEL_ACRES = 1;
    const parcelBoundsCache = apnIndex
      .filter(entry => Number(entry.layer.feature.properties['GSA Acres']) >= MIN_LABEL_ACRES)
      .map(entry => ({ layer: entry.layer, bounds: entry.layer.getBounds() }));
    let labeledLayers = new Set();

    function updateVisibleLabels() {
      const show = map.getZoom() >= LABEL_MIN_ZOOM;
      document.getElementById('map').classList.toggle('labels-visible', show);

      if (!show) {
        labeledLayers.forEach(layer => layer.unbindTooltip());
        labeledLayers.clear();
        return;
      }

      const viewBounds = map.getBounds();
      const nowVisible = new Set();
      parcelBoundsCache.forEach(({ layer, bounds }) => {
        if (viewBounds.intersects(bounds)) {
          nowVisible.add(layer);
          if (!labeledLayers.has(layer)) {
            layer.bindTooltip(String(layer.feature.properties[PARCEL_APN_FIELD]), {
              permanent: true,
              direction: 'center',
              className: 'apn-label'
            });
          }
        }
      });
      labeledLayers.forEach(layer => {
        if (!nowVisible.has(layer)) layer.unbindTooltip();
      });
      labeledLayers = nowVisible;
    }

    map.on('zoomend moveend', updateVisibleLabels);
    updateVisibleLabels();

    document.getElementById('hint').textContent =
      'Click a parcel to see its details and crop mix.';

    map.fitBounds(geoLayer.getBounds(), { padding: [30, 30] });

  }).catch(err => {
    document.getElementById('hint').textContent =
      'Could not load parcels.geojson / landcover.geojson (' + err.message + '). ' +
      'If you opened this file directly (file://), fetch() is blocked by the browser — ' +
      'run a local server (e.g. "python3 -m http.server") or upload it to your site.';
    console.error(err);
  });

</script>
</body>
</html>
